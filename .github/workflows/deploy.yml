name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  # Statik içeriği periyodik tazele (canlı veriyi tarayıcı zaten dakikada bir çeker;
  # bu yeniden derleme yeni maç/oyuncu sayfalarını ve önbelleğe alınmış görünümleri günceller).
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Eşzamanlı dağıtımları engelle; çalışan dağıtımı iptal etme.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Kalite kapısı: kırık kod deploy olmasın (lint → tip → test → derleme).
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
